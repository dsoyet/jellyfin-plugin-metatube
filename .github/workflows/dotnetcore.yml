name: Build Plugin

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout jellyfin-server
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/jellyfin
          path: ../jellyfin

      - name: Checkout plugin
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build --configuration Release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MetaTube
          path: Jellyfin.Plugin.MetaTube/bin/Jellyfin.MetaTube@*.zip
            Jellyfin.Plugin.MetaTube/bin/Emby.MetaTube@v${{ steps.shell.outputs.version }}.zip
